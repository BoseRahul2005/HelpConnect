<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - HelpConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="get-started.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <span class="logo-icon">💚</span>
                <h1 class="logo-text">HelpConnect</h1>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="content-card">
            <!-- Title Section -->
            <div class="title-section">
                <h2 class="main-title">Get Started with HelpConnect</h2>
                <p class="subtitle">Choose how you want to join our community</p>
            </div>

            <!-- Selection Cards Container -->
            <div class="selection-cards">
                <!-- NGO Card -->
                <div class="selection-card ngo-card">
                    <div class="card-icon-container ngo-icon">
                        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 21h18M3 10h18M5 6h14M5 6V3h14v3M9 21v-8M15 21v-8M9 13h6v8H9z"/>
                        </svg>
                    </div>
                    <h3 class="card-heading">For NGO's</h3>
                    <p class="card-description">Register your organization, manage campaigns, and reach more donors.</p>
                    <div class="card-buttons">
                        <button class="btn btn-primary">Sign Up</button>
                        <button class="btn btn-outline">Log In</button>
                    </div>
                </div>

                <!-- Single User Card -->
                <div class="selection-card user-card">
                    <div class="card-icon-container user-icon">
                        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M6 20c0-3.314 2.686-6 6-6s6 2.686 6 6"/>
                        </svg>
                    </div>
                    <h3 class="card-heading">For Single User</h3>
                    <p class="card-description">Discover causes, donate, and support people in need directly.</p>
                    <div class="card-buttons">
                        <button class="btn btn-primary">Sign Up</button>
                        <button class="btn btn-outline">Log In</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="get-started.js"></script>
</body>
</html>
